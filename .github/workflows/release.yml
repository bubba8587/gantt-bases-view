name: Release

# Pushing a version tag (e.g. `1.2.0`, matching manifest.json exactly — no
# "v" prefix, as required by Obsidian/BRAT) builds the plugin and publishes
# a GitHub release with the three assets BRAT installs from.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  # Manual dispatch releases the manifest.json version from the chosen branch,
  # creating the tag as part of the release.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          manifest_version=$(node -p "require('./manifest.json').version")
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            # Tag push: the tag must match manifest.json exactly (BRAT requirement).
            if [ "$GITHUB_REF_NAME" != "$manifest_version" ]; then
              echo "Tag $GITHUB_REF_NAME does not match manifest.json version $manifest_version" >&2
              exit 1
            fi
            version="$GITHUB_REF_NAME"
            target_args=()
          else
            # Manual dispatch: release the manifest version, tagging this commit.
            version="$manifest_version"
            target_args=(--target "$GITHUB_SHA")
          fi

          if [ -f RELEASE_NOTES.md ]; then
            notes_args=(--notes-file RELEASE_NOTES.md)
          else
            notes_args=(--generate-notes)
          fi

          gh release create "$version" \
            --title "v$version" \
            "${notes_args[@]}" \
            "${target_args[@]}" \
            main.js manifest.json styles.css
